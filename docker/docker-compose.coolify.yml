# Coolify-specific compose: built from source (this fork has custom features,
# the upstream GHCR image doesn't include them). No host port mapping —
# Coolify's Traefik proxies to the container port you declare in its UI (8080).
services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file: .env
    volumes:
      # /data holds auto-generated secrets, Enable Banking keys, and the
      # wizard's crypto key — persistent across redeploys.
      - picsou_data:/data
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-picsou}?sslmode=prefer
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-picsou}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      TR_AUTH_URL: http://tr-auth:8001
    depends_on:
      - db
      - tr-auth

  tr-auth:
    build:
      context: ../services/tr-auth
      dockerfile: Dockerfile
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-picsou}
      POSTGRES_USER: ${POSTGRES_USER:-picsou}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-picsou}
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
  picsou_data:
