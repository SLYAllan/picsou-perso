# Coolify deployment: built from source (this fork has custom features, the
# upstream GHCR image doesn't include them). No host port mapping — Coolify's
# Traefik proxies to container port 8080 via the domain you set in its UI.
services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    volumes:
      # /data holds auto-generated secrets, Enable Banking keys, and the
      # wizard's crypto key — persistent across redeploys.
      - picsou_data:/data
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-picsou}?sslmode=prefer
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-picsou}
      # :? makes the deploy fail loudly if a secret is missing in the Coolify UI —
      # no silent fallback to a default credential.
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in Coolify (openssl rand -base64 32)}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in Coolify (openssl rand -base64 48)}
      CRYPTO_ENCRYPTION_KEY: ${CRYPTO_ENCRYPTION_KEY:?set CRYPTO_ENCRYPTION_KEY in Coolify (openssl rand -base64 32)}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      SECURE_COOKIES: ${SECURE_COOKIES:-true}
      TR_AUTH_URL: http://tr-auth:8001
    depends_on:
      - db
      - tr-auth

  tr-auth:
    build:
      context: ./services/tr-auth
      dockerfile: Dockerfile
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      # DB name/user are not secrets — defaults are fine. The password is.
      POSTGRES_DB: ${POSTGRES_DB:-picsou}
      POSTGRES_USER: ${POSTGRES_USER:-picsou}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in Coolify (openssl rand -base64 32)}
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
  picsou_data:
